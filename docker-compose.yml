version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasks-api
    ports:
      - "3000:3000"
    volumes:
      # WICHTIG FÜR DIE DEMO: Bindet deinen lokalen Ordner in den Container ein
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000